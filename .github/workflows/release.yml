name: release

# Publicación de una versión del contrato de convenciones OTel de CultureTech.
# Se dispara al empujar un tag `vX.Y.Z`. La versión sale SIEMPRE del tag (fuente
# de verdad); no hay versiones hardcodeadas en el repo.
#
# NOTA DE DISEÑO (importante): el repo de convenciones contiene SOLO el contrato
# Weaver (model/, policies/, templates/). Los templates generan ÚNICAMENTE los
# archivos de constantes (`attributes.*` / `CtAttributes.java`), NO los
# manifiestos de empaquetado (package.json, pom.xml, pyproject.toml, go.mod).
# Por eso este workflow SINTETIZA esos manifiestos EN CI, dentro de `gen/`
# (salida efímera), inyectando la versión del tag. Así nada de empaquetado se
# versiona en el repo (se respeta la regla anti-contaminación de la raíz).

on:
  push:
    tags:
      # Tag GLOBAL (dispara la publicación de TS/Java/Python + creación del tag Go).
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Tag de SUBDIRECTORIO Go (lo crea publish-go). Los jobs de TS/Java/Python NO
      # deben re-publicar en este trigger -> se filtran con `if: startsWith(...'refs/tags/v')`.
      # (Además, los tags creados por el GITHUB_TOKEN de Actions NO re-disparan
      # workflows, por lo que este trigger es defensa ante un push manual.)
      - "gen/go/v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate de calidad: sin validación (registro + policies), sin publicación.
  # ---------------------------------------------------------------------------
  validate:
    name: validate (weaver check)
    # Solo en el tag global `v*` (no en `gen/go/v*`).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: open-telemetry/weaver/.github/actions/setup-weaver@v0.24.1
        with:
          version: "0.24.1"
      - name: Validar registro y policies
        run: weaver registry check --registry model/ --policy policies/

  # ---------------------------------------------------------------------------
  # TypeScript -> npm en GitHub Packages
  # ---------------------------------------------------------------------------
  publish-typescript:
    name: publish-typescript (npm)
    # Solo en el tag global `v*` (evita re-publicar en el trigger `gen/go/v*`).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: open-telemetry/weaver/.github/actions/setup-weaver@v0.24.1
        with:
          version: "0.24.1"
      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Generar constantes TypeScript
        run: |
          weaver registry generate --registry model/ --templates templates/ typescript gen/typescript
      - name: Sintetizar paquete npm (package.json + tsconfig) con la versión del tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd gen/typescript
          cat > package.json <<EOF
          {
            "name": "@culturetechcl/lab-otel-conventions",
            "version": "${VERSION}",
            "description": "Constantes tipadas de las convenciones OpenTelemetry (ct.*) de CultureTech. Generado por OpenTelemetry Weaver.",
            "license": "UNLICENSED",
            "type": "module",
            "main": "dist/attributes.js",
            "types": "dist/attributes.d.ts",
            "files": ["dist", "attributes.ts"],
            "publishConfig": { "registry": "https://npm.pkg.github.com" },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/CultureTechCL/culturetech-lab-otel-conventions.git",
              "directory": "gen/typescript"
            }
          }
          EOF
          cat > tsconfig.json <<'EOF'
          {
            "compilerOptions": {
              "target": "ES2020", "module": "ES2020", "moduleResolution": "node",
              "declaration": true, "outDir": "dist", "strict": true, "skipLibCheck": true
            },
            "include": ["attributes.ts"]
          }
          EOF
      - name: Compilar (tsc -> dist)
        run: |
          cd gen/typescript
          npm install --no-audit --no-fund typescript@5
          npx tsc -p tsconfig.json
      - name: Publicar en GitHub Packages (npm)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd gen/typescript
          cat > .npmrc <<EOF
          @culturetechcl:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          npm publish

  # ---------------------------------------------------------------------------
  # Java -> Maven en GitHub Packages
  # ---------------------------------------------------------------------------
  publish-java:
    name: publish-java (maven)
    # Solo en el tag global `v*` (evita re-publicar en el trigger `gen/go/v*`).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - uses: open-telemetry/weaver/.github/actions/setup-weaver@v0.24.1
        with:
          version: "0.24.1"
      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Generar constantes Java en layout Maven
        run: |
          weaver registry generate --registry model/ --templates templates/ java \
            gen/java/src/main/java/cl/culturetech/otel
      - name: Sintetizar pom.xml con la versión del tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cat > gen/java/pom.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>cl.culturetech.otel</groupId>
            <artifactId>lab-otel-conventions</artifactId>
            <version>${VERSION}</version>
            <packaging>jar</packaging>
            <name>CultureTech Lab OTel Conventions</name>
            <description>Constantes tipadas de las convenciones OpenTelemetry (ct.*) de CultureTech. Generado por OpenTelemetry Weaver.</description>
            <url>https://github.com/CultureTechCL/culturetech-lab-otel-conventions</url>
            <properties>
              <maven.compiler.release>21</maven.compiler.release>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
            </properties>
            <distributionManagement>
              <repository>
                <id>github</id>
                <name>GitHub CultureTechCL Apache Maven Packages</name>
                <url>https://maven.pkg.github.com/CultureTechCL/culturetech-lab-otel-conventions</url>
              </repository>
            </distributionManagement>
          </project>
          EOF
      - name: Publicar en GitHub Packages (Maven)
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -f gen/java/pom.xml --batch-mode deploy -DskipTests

  # ---------------------------------------------------------------------------
  # Python -> wheel + sdist como assets del GitHub Release
  # ---------------------------------------------------------------------------
  publish-python:
    name: publish-python (release asset)
    # Solo en el tag global `v*` (evita re-publicar en el trigger `gen/go/v*`).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: open-telemetry/weaver/.github/actions/setup-weaver@v0.24.1
        with:
          version: "0.24.1"
      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Generar constantes Python dentro del paquete
        run: |
          weaver registry generate --registry model/ --templates templates/ python \
            gen/python/src/culturetech_otel_conventions
      - name: Sintetizar paquete Python (pyproject.toml + __init__.py) con la versión del tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd gen/python
          cat > src/culturetech_otel_conventions/__init__.py <<EOF
          """Convenciones semánticas ct.* de CultureTech (generado por OpenTelemetry Weaver)."""

          from .attributes import (
              CommonAttributes,
              FulfillmentAttributes,
              OrderAttributes,
              PaymentAttributes,
              ShippingAttributes,
          )

          __all__ = [
              "CommonAttributes",
              "OrderAttributes",
              "PaymentAttributes",
              "FulfillmentAttributes",
              "ShippingAttributes",
          ]

          __version__ = "${VERSION}"
          EOF
          cat > pyproject.toml <<EOF
          [build-system]
          requires = ["setuptools>=61.0"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "culturetech-lab-otel-conventions"
          version = "${VERSION}"
          description = "Constantes tipadas de las convenciones OpenTelemetry (ct.*) de CultureTech."
          requires-python = ">=3.8"
          license = { text = "UNLICENSED" }

          [tool.setuptools.packages.find]
          where = ["src"]
          EOF
      - name: Construir wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build gen/python
      - name: Adjuntar artefactos al GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Asegura que el release del tag exista (idempotente) y sube los artefactos.
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" \
            --notes "Contrato de convenciones OTel (ct.*) de CultureTech — ${GITHUB_REF_NAME}." \
            || echo "El release ya existe; se continúa."
          gh release upload "${GITHUB_REF_NAME}" \
            gen/python/dist/*.whl gen/python/dist/*.tar.gz --clobber

  # ---------------------------------------------------------------------------
  # Go -> versionar `gen/go/` en el tag y verificar consumo remoto por `go get`.
  #
  # A diferencia de TS/Java/Python (registries externos), el módulo Go SE VERSIONA
  # en el repo. Como `go.mod` vive en el SUBDIRECTORIO `gen/go/`, Go exige que el
  # tag de versión lleve el PREFIJO del subdirectorio: `gen/go/vX.Y.Z` (NO `vX.Y.Z`).
  # Por eso hay DOS tags por release:
  #   - `vX.Y.Z`         -> tag global (dispara este workflow; publica TS/Java/Python).
  #   - `gen/go/vX.Y.Z`  -> tag del módulo Go (lo crea este job; lo usa `go get`).
  # Ambos apuntan al MISMO commit (el de `vX.Y.Z`), que incluye `gen/go/` commiteado.
  #
  # `gen/go/` se mantiene commiteado y al día en `main` (con drift detection en
  # validate.yaml), así que este job NO recommitea ni mueve el tag global: solo
  # CREA el tag de subdirectorio y verifica el consumo remoto. Idempotente: si el
  # tag `gen/go/vX.Y.Z` ya existe, no falla (skip).
  #
  # NOTA: los tags creados por el GITHUB_TOKEN de Actions no re-disparan workflows;
  # y aunque un `gen/go/v*` se empujara a mano, los jobs de TS/Java/Python están
  # filtrados con `if: startsWith(github.ref, 'refs/tags/v')`.
  # ---------------------------------------------------------------------------
  publish-go:
    name: publish-go (tag Go + go get)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: open-telemetry/weaver/.github/actions/setup-weaver@v0.24.1
        with:
          version: "0.24.1"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Regenerar gen/go/ y verificar que coincide con lo commiteado
        run: |
          weaver registry generate --registry model/ --templates templates/ go gen/go
          grep -q "^module github.com/CultureTechCL/culturetech-lab-otel-conventions/gen/go$" gen/go/go.mod
          if ! git diff --quiet -- gen/go/; then
            echo "::error::gen/go/ commiteado en el tag no coincide con el modelo. Regenera y commitea gen/go/ en main antes de taggear."
            git --no-pager diff -- gen/go/
            exit 1
          fi
      - name: go mod tidy + compilación
        run: |
          cd gen/go
          go mod tidy
          go vet ./...
          go build ./...
      - name: Crear el tag de subdirectorio Go `gen/go/v<VERSION>` (idempotente)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          GO_TAG="gen/go/v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${GO_TAG}" | grep -q "${GO_TAG}"; then
            echo "El tag ${GO_TAG} ya existe en origin; no se recrea (idempotente)."
          else
            git tag "${GO_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${GO_TAG}"
            echo "Creado y empujado ${GO_TAG} -> ${GITHUB_SHA}"
          fi
      - name: Verificar consumo remoto (go get con el tag de subdirectorio)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          # GOPRIVATE hace que `go get` vaya directo al repo por git (salta el
          # proxy y la checksum DB públicos). Los consumidores en CI suelen
          # necesitar lo mismo para un repo/tag recién publicado.
          GOPRIVATE: github.com/CultureTechCL/*
        run: |
          mkdir -p /tmp/go-verify && cd /tmp/go-verify
          go mod init verify
          go get "github.com/CultureTechCL/culturetech-lab-otel-conventions/gen/go@v${VERSION}"
          go mod tidy
          echo "✅ go get remoto verificado: .../gen/go@v${VERSION} (resuelve tag gen/go/v${VERSION})"
