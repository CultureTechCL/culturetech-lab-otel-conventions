name: release

# Se dispara al empujar un tag `vX.Y.Z`. Publica:
#   - TypeScript -> npm en GitHub Packages
#   - Java       -> Maven en GitHub Packages
#   - Python     -> wheel + sdist adjuntos al GitHub Release
#   - Go         -> el tag mismo ES el release del módulo (no requiere publicación)
# y crea un GitHub Release con todos los artefactos adjuntos.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # crear el GitHub Release y subir assets
  packages: write   # publicar en GitHub Packages (npm + Maven)

jobs:
  check:
    name: weaver check (gate previo a publicar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-weaver
      - run: weaver registry check --registry model/ --policy policies/

  publish:
    name: publicar paquetes + release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-weaver

      - name: Derivar versión del tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verificar consistencia de versión (tag == manifiestos)
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          fail=0
          grep -q "\"version\": \"${V}\"" packages/typescript/package.json || { echo "::error::package.json != ${V}"; fail=1; }
          grep -q "<version>${V}</version>" packages/java/pom.xml               || { echo "::error::pom.xml != ${V}"; fail=1; }
          grep -q "version = \"${V}\"" packages/python/pyproject.toml           || { echo "::error::pyproject.toml != ${V}"; fail=1; }
          exit $fail

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@culturetechcl"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerar constantes (fresco desde el modelo)
        run: ./scripts/generate.sh

      - name: Go — sanity build
        run: go build ./...

      # --- TypeScript: npm en GitHub Packages ---
      - name: TypeScript — build, pack y publish (npm GitHub Packages)
        working-directory: packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm pack   # produce el .tgz para adjuntar al Release
          npm publish

      # --- Java: Maven en GitHub Packages ---
      - name: Java — package y deploy (Maven GitHub Packages)
        working-directory: packages/java
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -q -B deploy -DskipTests

      # --- Python: wheel + sdist (asset del Release) ---
      - name: Python — build wheel + sdist
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Crear GitHub Release con artefactos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          notes=$(cat <<EOF
          ## culturetech-lab-otel-conventions ${TAG}

          Contrato central de convenciones OpenTelemetry (\`ct.*\`) de CultureTech.

          ### Paquetes publicados
          | Lenguaje | Destino | Coordenada |
          |---|---|---|
          | TypeScript | GitHub Packages (npm) | \`@culturetechcl/lab-otel-conventions@${V}\` |
          | Java | GitHub Packages (Maven) | \`cl.culturetech.otel:lab-otel-conventions:${V}\` |
          | Python | Asset de este Release (wheel) | \`culturetech-lab-otel-conventions ${V}\` |
          | Go | Este tag (\`go get\`) | \`github.com/CultureTechCL/culturetech-lab-otel-conventions@${TAG}\` |

          ### Consumo de Go
          \`\`\`bash
          go get github.com/CultureTechCL/culturetech-lab-otel-conventions@${TAG}
          \`\`\`
          EOF
          )
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$notes" \
            packages/typescript/*.tgz \
            packages/java/target/lab-otel-conventions-${V}.jar \
            packages/python/dist/*.whl \
            packages/python/dist/*.tar.gz
