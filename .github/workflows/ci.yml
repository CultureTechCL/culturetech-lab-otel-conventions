name: ci

# Gate de gobernanza del contrato de telemetría:
#   1) `weaver registry check` (validación + policies).
#   2) Regenera los 4 paquetes y verifica que compilen.
#   3) Detección de drift: la salida generada commiteada debe coincidir con la
#      que produce el modelo actual (evita que el código generado quede obsoleto).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: weaver check (validación + policies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-weaver
      - name: Validar registro y policies
        run: weaver registry check --registry model/ --policy policies/

  verify-codegen:
    name: generar + compilar + drift
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-weaver
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerar constantes desde el modelo
        run: ./scripts/generate.sh

      - name: Detección de drift (salida generada vs. modelo)
        run: |
          if ! git diff --exit-code -- otel/ packages/; then
            echo "::error::La salida generada commiteada no coincide con el modelo. Corre ./scripts/generate.sh y commitea." >&2
            exit 1
          fi

      - name: Go — build
        run: go build ./...

      - name: TypeScript — build
        working-directory: packages/typescript
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Java — compile
        working-directory: packages/java
        run: mvn -q -B compile

      - name: Python — build wheel + import
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install dist/*.whl
          python -c "from culturetech_otel import OrderAttributes; assert OrderAttributes.ORDER_ID == 'ct.order.id'"
