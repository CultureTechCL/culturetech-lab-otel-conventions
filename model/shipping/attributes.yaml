# =============================================================================
# Dominio: shipping
# =============================================================================
# Atributos que describen el envío de una orden. Incluye `ct.shipping.runtime_variant`,
# un enum que sirve además como demostración de que el contrato puede modelar
# detalles de PLATAFORMA de ejecución del servicio emisor (JVM vs GraalVM), útil
# para correlacionar comportamiento/rendimiento con el runtime.
#
# PUNTO DE EXTENSIÓN (registro jerárquico): carpeta autocontenida; extraíble a
# su propio registro sin reescritura.
# =============================================================================
groups:
  - id: registry.ct.shipping
    type: attribute_group
    brief: Atributos de envío/despacho de una orden.
    attributes:
      - id: ct.shipping.courier
        type: string
        stability: development
        brief: Nombre del courier/transportista responsable del envío.
        examples: ["chilexpress", "starken", "correos-chile"]

      - id: ct.shipping.tracking_code
        type: string
        stability: development
        brief: Código de seguimiento (tracking) del envío entregado por el courier.
        examples: ["CX-778812345", "SK-0099123"]

      # Conjunto CERRADO -> enum con `members`.
      - id: ct.shipping.runtime_variant
        stability: development
        brief: >-
          Variante de runtime sobre la que corre el servicio de shipping que
          emite la telemetría. Permite correlacionar métricas/latencias con la
          plataforma de ejecución.
        type:
          members:
            - id: jvm
              value: "jvm"
              brief: Ejecución sobre la JVM estándar (HotSpot).
              stability: development
            - id: graalvm
              value: "graalvm"
              brief: Ejecución sobre GraalVM (p. ej. imagen nativa).
              stability: development
