# Configuración de template (Weaver Forge) para el target `python`.
# Ver comentarios equivalentes en templates/go/weaver.yaml.
whitespace_control:
  trim_blocks: true
  lstrip_blocks: true

templates:
  - template: attributes.py.j2
    filter: '.groups | map(select(.id | startswith("registry.ct.")))'
    application_mode: single
    file_name: "attributes.py"
